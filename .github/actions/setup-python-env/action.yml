name: Setup Python environment

description: Setup Python, install uv with cache, and sync dependencies

inputs:
  python-version:
    description: Python version to install
    required: false
    default: "3.13"

runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: ${{ inputs.python-version }}
    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true
        cache-dependency-glob: |
          pyproject.toml
          uv.lock
    - name: Install dependencies
      run: uv sync
      shell: bash
