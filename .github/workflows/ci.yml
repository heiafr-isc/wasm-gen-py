name: CI

on:
    push:
    pull_request:

jobs:
    static-analysis:
        name: Static Analysis
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v6
            - name: Setup Python environment
              uses: ./.github/actions/setup-python-env
            - name: Ruff
              run: uv run ruff check .
            - name: Black
              run: uv run black --check .
            - name: Pyright
              run: uv run pyright
            - name: Mypy
              run: uv run mypy --strict src tests

    build-and-test:
        name: Build and Test
        runs-on: ubuntu-latest
        needs: static-analysis
        steps:
            - name: Install WASM toolchain
              run: sudo apt install -y wabt
            - name: Checkout
              uses: actions/checkout@v6
            - name: Setup Python environment
              uses: ./.github/actions/setup-python-env
            - name: Build package
              run: uv build
            - name: Test
              run: uv run pytest
